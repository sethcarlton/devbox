name: Publish Unraid Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - scripts/**
      - .github/workflows/publish-unraid.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Unraid image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ghcr.io/sethcarlton/devbox:unraid
          build-args: |
            USERNAME=seth
            USER_UID=1000
            USER_GID=100
